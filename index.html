<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Анонимный чат ДВССК</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#e3f2fd,#ffffff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:380px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
text-align:center;
}

textarea{
width:100%;
height:90px;
border:none;
background:#f1f3f6;
border-radius:12px;
padding:12px;
margin-top:15px;
font-size:14px;
outline:none;
}

button{
margin-top:15px;
width:100%;
border:none;
background:#1976d2;
color:white;
padding:12px;
border-radius:12px;
font-size:15px;
}
</style>
</head>

<body>

<div class="box">
<h2>Анонимный чат ДВССК</h2>
<p style="font-size:13px;color:gray">
Специалисты помогут вам конфиденциально 🤍
</p>

<textarea id="text" placeholder="Опишите ситуацию..."></textarea>
<button onclick="start()">Начать чат</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"ТВОЙ_API",
authDomain:"dvsskpsy.firebaseapp.com",
projectId:"dvsskpsy"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.start = async function(){

let id = Math.random().toString(36).substr(2,9);

await setDoc(doc(db,"chats",id),{
messages:[{
from:"user",
text:document.getElementById("text").value,
time:Date.now()
}],
lastMessage:document.getElementById("text").value,
lastTime:Date.now()
});

location.href="chat.html?id="+id;

}

</script>
</body>
</html>
