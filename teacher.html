<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Панель</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
margin:0;
font-family:Arial,sans-serif;
height:100vh;
height:100dvh;
display:flex;
background:#fff;
overflow:hidden;
}

/* Левая панель — список чатов */
#left{
width:280px;
max-width:85%;
border-right:1px solid #ccc;
overflow:auto;
background:#f5f7fb;
position:fixed;
left:0;
top:0;
bottom:0;
z-index:100;
transform:translateX(-100%);
transition:transform .25s ease;
padding:10px 0;
}

#left.active{transform:translateX(0)}

/* Затемнение фона при открытом меню */
#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
z-index:90;
display:none;
}
#overlay.active{display:block}

/* Кнопка меню — только для мобильных */
#menuBtn{
display:none;
position:fixed;
top:12px;
left:12px;
z-index:110;
width:44px;
height:44px;
border:none;
border-radius:50%;
background:#1976d2;
color:#fff;
font-size:20px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

/* Правая часть — чат */
#right{
flex:1;
display:flex;
flex-direction:column;
width:100%;
}

.chatItem{
padding:14px 16px;
border-bottom:1px solid #ddd;
cursor:pointer;
background:#fff;
transition:background .15s;
}
.chatItem:active{background:#e8eaf6}
.chatItem small{color:#666;font-size:13px;display:block;margin-top:4px}

#chat{
flex:1;
overflow-y:auto;
padding:12px;
background:#fff;
padding-bottom:80px;
}

/* Сообщения */
.message{
margin:8px 0;
display:flex;
flex-direction:column;
max-width:85%;
}
.message.left{align-self:flex-start}
.message.right{align-self:flex-end;align-items:flex-end}

.message span{
display:inline-block;
padding:10px 14px;
border-radius:18px;
font-size:15px;
line-height:1.4;
word-wrap:break-word;
}
.message.left span{
background:#eee;
color:#000;
border-bottom-left-radius:6px;
}
.message.right span{
background:#1976d2;
color:#fff;
border-bottom-right-radius:6px;
}

/* Поле ввода */
#sendBox{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
gap:8px;
padding:10px 12px;
background:#fff;
border-top:1px solid #ccc;
z-index:80;
}

#sendBox input{
flex:1;
padding:14px 16px;
border:1px solid #ddd;
border-radius:24px;
font-size:16px; /* предотвращает зум на iOS */
outline:none;
min-height:44px;
}

#sendBox button{
min-width:80px;
padding:0 18px;
background:#1976d2;
color:#fff;
border:none;
border-radius:24px;
font-size:15px;
font-weight:500;
cursor:pointer;
min-height:44px;
}
#sendBox button:active{opacity:.9}

/* === МОБИЛЬНЫЕ СТИЛИ (до 768px) === */
@media (max-width:768px){
#menuBtn{display:block}

#left{
width:85%;
max-width:320px;
box-shadow:2px 0 12px rgba(0,0,0,.15);
}

/* При открытом меню — блокируем скролл основного контента */
body.menu-open{overflow:hidden}

/* Чуть больше отступы для тача */
.chatItem{padding:16px}
.message span{padding:12px 16px;font-size:16px}
}

/* Скроллбар — аккуратно */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
</style>
</head>

<body>

<!-- Кнопка меню -->
<button id="menuBtn" onclick="toggleMenu()">☰</button>
<div id="overlay" onclick="toggleMenu()"></div>

<!-- Список чатов -->
<div id="left"></div>

<!-- Чат -->
<div id="right">
<div id="chat">Выберите чат</div>
</div>

<!-- Поле ввода -->
<div id="sendBox">
<input id="msg" type="text" placeholder="Сообщение..." autocomplete="off">
<button onclick="send()">Отпр.</button>
</div>

<script type="module">
// ... твой JS-код без изменений ...
// (Firebase инициализация, onSnapshot, openChat, send — всё как было)

// Добавь только эту функцию для мобильного меню:
window.toggleMenu=function(){
document.getElementById('left').classList.toggle('active');
document.getElementById('overlay').classList.toggle('active');
document.body.classList.toggle('menu-open');
}

// Автозакрытие меню при выборе чата (опционально)
const originalOpenChat = window.openChat;
window.openChat = function(id){
if(window.innerWidth <= 768) toggleMenu();
originalOpenChat?.(id);
}
</script>

</body>
</html>
