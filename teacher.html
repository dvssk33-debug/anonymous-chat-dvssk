<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Панель психолога</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f7fb;
display:flex;
justify-content:center;
}

.wrap{
width:95%;
max-width:500px;
margin-top:25px;
}

.chatCard{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
font-size:13px;
}

a{
color:#1976d2;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="wrap">
<h3>Все чаты</h3>
<div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"ТВОЙ_API",
authDomain:"dvsskpsy.firebaseapp.com",
projectId:"dvsskpsy"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const q = query(collection(db,"chats"),orderBy("lastTime","desc"));

onSnapshot(q,(snap)=>{

let html="";

snap.forEach(doc=>{

let d = doc.data();

let time = new Date(d.lastTime).toLocaleString();

html+=`
<div class="chatCard">
<b>Чат:</b> ${doc.id}<br>
<b>Сообщение:</b> ${d.lastMessage}<br>
<b>Время:</b> ${time}<br>
<a href="chat-teacher.html?id=${doc.id}">Открыть</a>
</div>
`;

});

document.getElementById("list").innerHTML = html;

});

</script>
</body>
</html>
